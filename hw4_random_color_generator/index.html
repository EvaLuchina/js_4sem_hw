<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color generator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="type-btns">
            <input type="radio" name="toGenerate" id="oneColorBtn" checked>
            <label for="oneColorBtn" class="radio-label">Generate one color</label>
            <input type="radio" name="toGenerate" id="paletteBtn">
            <label for="paletteBtn" class="radio-label">Generate palette</label>
        </div>
        <button id="generateBtn">Generate</button>
    </header>
    <main>
        <div class="color-blocks"></div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
