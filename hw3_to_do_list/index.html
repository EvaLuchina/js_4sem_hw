<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h1 class="app-header">My To-Do List</h1>
            <div class="input-area">
                <input type="text" id="taskInput" placeholder="Add your task">
                <button id="addBtn"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="task-complition-btns">
                <button type="button" class="task-complition-btn" id="allBtn">All</button>
                <button type="button" class="task-complition-btn" id="inProgressBtn">In Progress</button>
                <button type="button" class="task-complition-btn" id="finishedBtn">Finished</button>
            </div>
            <div class="tasks">
                <ul id="taskList"></ul>
            </div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
